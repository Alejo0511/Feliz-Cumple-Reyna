<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Sorpresa para Cristina! 🎁</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d4b8 25%, #dcc9a3 50%, #d4bf8e 75%, #c9b47a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', 'Garamond', serif;
        }
        
        .loading {
            text-align: center;
        }
        
        .loading h1 {
            color: #2c1810;
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        .loading p {
            color: #4a3728;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="loading">
        <h1>✨ Cargando tu sorpresa... ✨</h1>
        <p>Espera un momento...</p>
    </div>
    
    <script>
        // Redirigir a gift.html después de un breve delay
        setTimeout(function() {
            window.location.href = 'gift.html';
        }, 500);
    </script>
</body>
</html>
